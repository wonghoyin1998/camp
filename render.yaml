services:
  - type: web
    name: camp-route-conquest
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build:render
    startCommand: npm run start:render
    healthCheckPath: /api/game
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.19.0
      - key: DATABASE_URL
        fromDatabase:
          name: camp-route-conquest-db
          property: connectionString
      - key: INITIAL_GAME_MODE
        value: live
      - key: GM_PIN
        sync: false
      - key: INITIAL_RED_PIN
        sync: false
      - key: INITIAL_BLUE_PIN
        sync: false
      - key: INITIAL_GOLD_PIN
        sync: false

databases:
  - name: camp-route-conquest-db
    plan: free
    databaseName: camp_route_conquest
